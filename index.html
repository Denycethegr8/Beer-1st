<!DOCTYPE html>
<html>
<head>
 <meta charset="utf-8">
 <title>BEER</title>
 <style>

     }
     a:link{

         color:black;
         font-weight:bold;
     }
     .padding{
       padding-left:5px;
     }

 </style>
</head>
<body>
  <div class="beer-box">
    <div class="each-type">
      <a href="ale.html">
         <img src="images/ale.jpg" alt="ale image" title="ale">

      </a> 
    </div>
   <div class="each-type">
      <a href="lager.html">
        <img src="images/lager.jpg" alt="lager image" title="lager">
        <div class="disc padding">LAGER</div>
      </a>
    </div>
   <div class="each-type">
      <a href="lambic.html">
        <img class="put-center" src="images/lambic.jpg" alt="lambic image" title="lambic">

      </a>     
    </div>
  </div>
